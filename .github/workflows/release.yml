name: Release

# Push a tag matching pyproject.toml (e.g. 0.0.63) to publish PyPI, build the
# versioned sc-runner image, and trigger an sc-inspector image rebuild by pushing
# an empty commit to sc-inspector via a deploy key (SSH push triggers workflows).
on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6.0.2
      - id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "$TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag ${TAG} is not a semver release tag (expected e.g. 0.0.63)"
            exit 1
          fi
          VERSION="${TAG#v}"
          PYPROJECT="$(grep '^version = ' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          if [ "$VERSION" != "$PYPROJECT" ]; then
            echo "::error::Tag ${TAG} (version ${VERSION}) does not match pyproject.toml (${PYPROJECT})"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

  pypi-check:
    name: Check PyPI for existing release
    needs: version
    runs-on: ubuntu-latest
    outputs:
      already_published: ${{ steps.check.outputs.already_published }}
    steps:
      - id: check
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          if curl -fsS "https://pypi.org/pypi/sparecores-runner/json" \
            | python3 -c "import json,sys,os; releases=json.load(sys.stdin).get('releases',{}); sys.exit(0 if os.environ['VERSION'] in releases and releases[os.environ['VERSION']] else 1)"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::sparecores-runner==${VERSION} is already on PyPI; skipping build and upload"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build package
    needs: [version, pypi-check]
    if: needs.pypi-check.outputs.already_published != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Install pypa/build
        run: python3 -m pip install build --user
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  pypi-publish:
    name: Upload release to PyPI
    needs: [version, build, pypi-check]
    if: needs.pypi-check.outputs.already_published != 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sparecores-runner
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  wait-pypi:
    name: Wait for PyPI propagation
    needs: [version, pypi-check, pypi-publish]
    if: >-
      always() &&
      needs.version.result == 'success' &&
      needs.pypi-check.result == 'success' &&
      needs.pypi-check.outputs.already_published != 'true' &&
      needs.pypi-publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait until the release is installable from PyPI
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 36); do
            if curl -fsS "https://pypi.org/pypi/sparecores-runner/json" \
              | python3 -c "import json,sys,os; releases=json.load(sys.stdin).get('releases',{}); sys.exit(0 if os.environ['VERSION'] in releases and releases[os.environ['VERSION']] else 1)"; then
              echo "sparecores-runner==${VERSION} is available on PyPI (attempt ${attempt})"
              exit 0
            fi
            echo "Waiting for PyPI propagation (attempt ${attempt}/36)..."
            sleep 10
          done
          echo "::error::Timed out waiting for sparecores-runner==${VERSION} on PyPI"
          exit 1

  image:
    name: Build and publish sc-runner image
    needs: [version, pypi-check, wait-pypi]
    if: >-
      always() &&
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.pypi-check.result == 'success' &&
      (needs.pypi-check.outputs.already_published == 'true' || needs.wait-pypi.result == 'success')
    uses: ./.github/workflows/image.yml
    with:
      runner_version: ${{ needs.version.outputs.version }}
    secrets: inherit

  inspector:
    name: Trigger sc-inspector image build
    needs: [version, image]
    if: >-
      always() &&
      !cancelled() &&
      needs.version.result == 'success' &&
      needs.image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Push release trigger commit to sc-inspector
        uses: actions/checkout@v6.0.2
        with:
          repository: SpareCores/sc-inspector
          ref: main
          ssh-key: ${{ secrets.SC_INSPECTOR_DEPLOY_KEY }}
      - name: Trigger sc-inspector workflow via deploy-key push
        env:
          VERSION: ${{ needs.version.outputs.version }}
          IMAGE_TAG: ${{ needs.version.outputs.image_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty \
            -m "sc-runner-release version=${VERSION} image_tag=${IMAGE_TAG}"
          git push origin HEAD:main
