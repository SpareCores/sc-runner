name: Build and publish sc-runner image

on:
  workflow_call:
    inputs:
      runner_version:
        description: Exact sparecores-runner PyPI version (empty = latest on main builds)
        required: false
        type: string
        default: ""
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      runner_version:
        description: Exact sparecores-runner PyPI version to install
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  # GHCR image paths must be lowercase; github.repository is SpareCores/sc-runner.
  IMAGE_NAME: sparecores/sc-runner
  IMAGE_OUTPUT: type=registry,push=true,oci-mediatypes=true,compression=zstd,compression-level=7,force-compression=true

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      runner_version: ${{ steps.resolve.outputs.runner_version }}
      cache_suffix: ${{ steps.resolve.outputs.cache_suffix }}
      image_tags: ${{ steps.resolve.outputs.image_tags }}
    steps:
      - id: resolve
        run: |
          VERSION="${{ inputs.runner_version }}"
          echo "runner_version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ -n "$VERSION" ]; then
            echo "cache_suffix=-${VERSION}" >> "$GITHUB_OUTPUT"
            {
              echo "image_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "cache_suffix=-main" >> "$GITHUB_OUTPUT"
            {
              echo "image_tags<<EOF"
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

  build-and-push-image:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare arch-specific tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              echo "${tag}-${{ matrix.arch }}"
            done <<< "${{ needs.resolve.outputs.image_tags }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: image
          platforms: ${{ matrix.platform }}
          outputs: ${{ env.IMAGE_OUTPUT }}
          build-args: |
            RUNNER_VERSION=${{ needs.resolve.outputs.runner_version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/sparecores/sc-runner:buildcache-${{ matrix.arch }}${{ needs.resolve.outputs.cache_suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/sparecores/sc-runner:buildcache-${{ matrix.arch }}${{ needs.resolve.outputs.cache_suffix }},mode=max

  merge-manifests:
    needs: [resolve, build-and-push-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifests
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              --tag "$tag" \
              "${tag}-amd64" \
              "${tag}-arm64"
          done <<< "${{ needs.resolve.outputs.image_tags }}"
